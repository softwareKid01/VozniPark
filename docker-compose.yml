version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: voznipark-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=SuperTajniPass123!
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voznipark-web
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=VozniParkDB;User Id=sa;Password=SuperTajniPass123!;TrustServerCertificate=True;

volumes:
  sql-data: